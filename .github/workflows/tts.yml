name: Test Mac Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Mac environment
        run: |
          echo "MacOS runner is working"
          sw_vers

      - name: Create output
        run: |
          mkdir output
          echo "Workflow is working" > output/result.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: output/
